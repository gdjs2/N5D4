name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build_site:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          # Points to the lock file inside your docs folder
          cache-dependency-path: docs/package-lock.json

      - name: Install dependencies
        # Runs the command inside the docs folder
        run: npm install
        working-directory: docs

      - name: Build
        run: npm run build
        working-directory: docs

      - name: Upload Artifacts
        uses: actions/upload-pages-artifact@v3
        with:
          # Points to the build output inside the docs folder
          path: 'docs/dist'

  deploy:
    needs: build_site
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4